    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    background-position: center;
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding: 40px 20px 70px;
  }

  .wrap{ max-width: 760px; margin:0 auto; }

  /* ---------- Header ---------- */
  header{ text-align:center; margin-bottom: 30px; }

  .stamp{
    width:96px; height:96px; margin:0 auto 14px;
    border:3px solid var(--forest);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    transform: rotate(-4deg);
    position:relative;
    overflow:hidden;
    background: var(--card);
    box-shadow: 0 2px 10px rgba(20,90,94,0.18);
  }
  .stamp::before{
    content:"";
    position:absolute; inset:5px;
    border:1px dashed rgba(255,253,246,0.75);
    border-radius:50%;
    z-index:2;
    pointer-events:none;
  }
  .stamp img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    transform: rotate(4deg) scale(1.08);
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size: clamp(2.1rem, 5vw, 3rem);
    margin: 0 0 6px;
    letter-spacing: -0.01em;
    color: var(--forest-deep);
  }
  h1 .amp{ font-style: italic; font-weight:500; color: var(--rust); }

  .subtitle{
    font-family:'Caveat', cursive;
    font-size: 1.3rem;
    color: var(--ink-soft);
    margin: 0;
  }

  /* ---------- Tabs ---------- */
  .tabs{
    display:flex; justify-content:center; gap:8px;
    margin: 30px 0 0;
    border-bottom: 1px solid var(--line);
    padding-bottom: 0;
  }
  .tab{
    display:flex; align-items:center; gap:8px;
    background:transparent; border:none; cursor:pointer;
    font-family:'Work Sans', sans-serif; font-weight:600; font-size:0.95rem;
    color: var(--ink-soft);
    padding: 10px 18px 12px;
    border-bottom: 3px solid transparent;
    margin-bottom: -1px;
    transition: color .15s ease, border-color .15s ease;
  }
  .tab .icon{ font-size:1.05rem; }
  .tab:hover{ color: var(--ink); }
  .tab.active{ color: var(--forest-deep); border-bottom-color: var(--rust); }

  /* ---------- Pages ---------- */
  .page{ display:none; }
  .page.active{ display:block; }

  .page-card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 30px clamp(20px, 4vw, 38px);
    margin-top: 28px;
  }

  .page-head{ margin-bottom: 4px; }
  .page-head h2{
    font-family:'Fraunces', serif; font-weight:600;
    font-size: 1.6rem; margin:0; color: var(--forest-deep);
  }
  .page-note{
    font-family:'Caveat', cursive; font-size:1.1rem;
    color: var(--rust); margin: 4px 0 0;
  }

  ul.list{ list-style:none; margin: 20px 0 0; padding:0; }
  ul.list li{
    display:flex; align-items:flex-start; gap:14px;
    padding: 12px 4px;
    border-bottom: 1px dashed var(--line);
  }
  ul.list li:last-child{ border-bottom:none; }
  ul.list li .check{ margin-top:1px; }

  .check{
    width:22px; height:22px; border-radius:5px;
    border:2px solid var(--forest);
    flex-shrink:0; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    background: transparent;
    transition: background .15s ease;
  }
  .check svg{ width:13px; height:13px; opacity:0; transition:opacity .12s ease; }
  .check.checked{ background: var(--forest); }
  .check.checked svg{ opacity:1; }

  .item-text{ flex:1; font-size:1.02rem; line-height:1.4; min-width:0; }
  .item-text .done{ color: var(--ink-soft); text-decoration: line-through; }
  .item-name{ display:block; }
  .item-link{
    display:inline-flex; align-items:center; gap:5px;
    font-size:0.82rem; color: var(--forest-deep);
    text-decoration:none; margin-top:3px;
    border-bottom: 1px dotted var(--forest-deep);
    max-width: 100%;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .item-link:hover{ color: var(--rust); border-color: var(--rust); }
  .item-link svg{ width:12px; height:12px; flex-shrink:0; }

  .remove-btn{
    border:none; background:none; color: var(--ink-soft);
    cursor:pointer; font-size:1.1rem; opacity:0.45;
    padding: 4px 6px; line-height:1; transition: opacity .12s ease, color .12s ease;
    flex-shrink:0;
  }
  .remove-btn:hover{ opacity:1; color: var(--rust); }

  .add-row{ display:flex; flex-wrap:wrap; gap:10px; margin-top: 18px; }
  .add-row input{
    flex:1; min-width: 160px; padding: 11px 14px;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    background: var(--paper);
    font-family:'Work Sans', sans-serif;
    font-size: 0.98rem; color: var(--ink);
  }
  .add-row input.link-input{ flex:0.85; }
  .add-row input:focus{ outline:none; border-color: var(--gold); }
  .add-row input::placeholder{ color: var(--ink-soft); opacity:0.7; }

  .add-btn{
    border: none; background: var(--rust); color: var(--paper);
    padding: 0 20px; border-radius: 8px; cursor:pointer;
    font-family:'Work Sans', sans-serif; font-weight:600; font-size:0.92rem;
    transition: background .15s ease, transform .1s ease;
  }
  .add-btn:hover{ background: var(--forest-deep); }
  .add-btn:active{ transform: scale(0.97); }

  .add-btn:focus-visible, .check:focus-visible, .remove-btn:focus-visible,
  .add-row input:focus-visible, .tab:focus-visible{
    outline: 2px solid var(--gold); outline-offset: 2px;
  }

  .empty-hint{
    font-family:'Caveat', cursive; color: var(--ink-soft);
    font-size: 1.1rem; padding: 14px 4px 4px;
  }

  .group-block{ margin-top: 26px; }
  .group-block:first-of-type{ margin-top: 20px; }
  .group-title{
    font-family:'Fraunces', serif; font-weight:600; font-style:italic;
    font-size: 1.05rem; color: var(--rust);
    display:flex; align-items:center; gap:10px;
    margin-bottom: 4px;
  }
  .group-title::before{
    content:"📍";
    font-size: 0.95rem;
  }
  .group-block .add-row{ margin-top: 12px; }
  .group-block + .group-block{
    border-top: 1px solid var(--line);
    padding-top: 18px;
  }

  .subgroup-title::before{ content:"💛"; font-size: 0.9rem; }
  .subgroup-block{ margin-top: 18px; padding-left: 10px; border-left: 2px solid var(--line); }
  .subgroup-block:first-of-type{ margin-top: 14px; }

  footer{
    text-align:center; margin-top:48px;
    font-family:'Caveat', cursive; font-size:1.1rem; color: var(--ink-soft);
  }

  @media (max-width: 480px){
    .tab .label{ display:none; }
    .tab{ padding: 10px 14px 12px; }
  }

  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>

  const keys = Object.keys(pages);
  let currentPage = keys[0];

  // id prefix for a list: plain key for flat pages, "key__group" or "key__group__sub" for grouped ones
  function idFor(key, group, sub){
    let id = group ? key + '__' + group : key;
    if(sub) id += '__' + sub;
    return id;
  }
  function arrFor(key, group, sub){
    if(!group) return state[key];
    const g = state[key][group];
    if(sub) return g[sub];
    return g;
  }
  // is this group actually a nested set of sub-groups (object of arrays), or a plain array?
  function isNested(key, group){
    const g = state[key][group];
    return g && !Array.isArray(g);
  }

  function renderTabs(){
    const tabs = document.getElementById('tabs');
    tabs.innerHTML = keys.map(key => {
      const p = pages[key];
      return `<button class="tab" id="tab-${key}" onclick="showPage('${key}')">
        <span class="icon">${p.icon}</span><span class="label">${p.label}</span>
      </button>`;
    }).join('');
    updateTabActive();
  }

  function updateTabActive(){
    keys.forEach(key => {
      document.getElementById('tab-' + key).classList.toggle('active', key === currentPage);
    });
  }

  function showPage(key){
    currentPage = key;
    document.querySelectorAll('.page').forEach(el => {
      el.classList.toggle('active', el.id === 'page-' + key);
    });
    updateTabActive();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function addRowHtml(key, group, sub){
    const p = pages[key];
    const id = idFor(key, group, sub);
    const isLinks = p.type === 'links';
    const linkField = isLinks ? '' : `<input type="text" id="${id}-link-input" class="link-input" placeholder="Link (optional)">`;
    const args = [key, group, sub].filter(Boolean).map(a => `'${a}'`).join(', ');
    return `<ul class="list" id="${id}-list"></ul>
      <div class="add-row">
        <input type="text" id="${id}-input" placeholder="${p.placeholder}">
        ${linkField}
        <button class="add-btn" onclick="addItem(${args})">Add</button>
      </div>`;
  }

  function wireAddRow(key, group, sub){
    const id = idFor(key, group, sub);
    document.getElementById(id + '-input').addEventListener('keydown', (e) => {
      if(e.key === 'Enter') addItem(key, group, sub);
    });
    const linkInput = document.getElementById(id + '-link-input');
    if(linkInput){
      linkInput.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') addItem(key, group, sub);
      });
    }
    renderList(key, group, sub);
  }

  function renderPages(){
    const container = document.getElementById('pages');
    container.innerHTML = keys.map((key) => {
      const p = pages[key];
      let body;
      if(p.type === 'grouped'){
        body = p.groups.map(group => {
          if(isNested(key, group)){
            const subKeys = Object.keys(state[key][group]);
            const subBlocks = subKeys.map(sub => `
              <div class="subgroup-block">
                <div class="group-title subgroup-title">${sub}</div>
                ${addRowHtml(key, group, sub)}
              </div>`).join('');
            return `
              <div class="group-block">
                <div class="group-title">${group}</div>
                ${subBlocks}
              </div>`;
          }
          return `
            <div class="group-block">
              <div class="group-title">${group}</div>
              ${addRowHtml(key, group)}
            </div>`;
        }).join('');
      } else {
        body = addRowHtml(key);
      }
      return `<div id="page-${key}" class="page ${key === currentPage ? 'active' : ''}">
        <div class="page-card">
          <div class="page-head"><h2>${p.icon} ${p.title}</h2></div>
          <p class="page-note">${p.note}</p>
          ${body}
        </div>
      </div>`;
    }).join('');

    keys.forEach(key => {
      const p = pages[key];
      if(p.type === 'grouped'){
        p.groups.forEach(group => {
          if(isNested(key, group)){
            Object.keys(state[key][group]).forEach(sub => wireAddRow(key, group, sub));
          } else {
            wireAddRow(key, group);
          }
        });
      } else {
        wireAddRow(key);
      }
    });
  }

  function renderList(key, group, sub){
    const id = idFor(key, group, sub);
    const arr = arrFor(key, group, sub);
    const ul = document.getElementById(id + '-list');
    const isLinks = pages[key].type === 'links';
    ul.innerHTML = '';
    if(arr.length === 0){
      const hint = document.createElement('div');
      hint.className = 'empty-hint';
      hint.textContent = isLinks ? 'no links saved yet — paste one below' : 'nothing here yet — add the first one below';
      ul.appendChild(hint);
      return;
    }
    arr.forEach((item, i) => {
      const li = document.createElement('li');

      if(isLinks){
        const icon = document.createElement('span');
        icon.textContent = '🔗';
        icon.style.flexShrink = '0';

        const text = document.createElement('span');
        text.className = 'item-text';
        const href = toHref(item.text);
        if(href){
          const a = document.createElement('a');
          a.href = href;
          a.textContent = item.text;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.style.color = 'var(--forest-deep)';
          text.appendChild(a);
        } else {
          text.textContent = item.text;
        }

        const remove = document.createElement('button');
        remove.className = 'remove-btn';
        remove.setAttribute('aria-label', 'Remove link');
        remove.onclick = () => { arr.splice(i, 1); renderList(key, group, sub); };
        remove.innerHTML = '✕';

        li.appendChild(icon);
        li.appendChild(text);
        li.appendChild(remove);
        ul.appendChild(li);
        return;
      }

      const check = document.createElement('button');
      check.className = 'check' + (item.done ? ' checked' : '');
      check.setAttribute('aria-label', item.done ? 'Mark as not done' : 'Mark as done');
      check.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#FFFDF6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      check.onclick = () => { item.done = !item.done; renderList(key, group, sub); };

      const text = document.createElement('span');
      text.className = 'item-text';
      const name = document.createElement('span');
      name.className = 'item-name';
      if(item.done){
        name.innerHTML = '<span class="done">' + escapeHtml(item.text) + '</span>';
      } else {
        name.textContent = item.text;
      }
      text.appendChild(name);

      const href = item.url ? toHref(item.url) : null;
      if(href){
        const a = document.createElement('a');
        a.href = href;
        a.className = 'item-link';
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg><span>' + escapeHtml(displayUrl(href)) + '</span>';
        text.appendChild(a);
      }

      const remove = document.createElement('button');
      remove.className = 'remove-btn';
      remove.setAttribute('aria-label', 'Remove item');
      remove.innerHTML = '✕';
      remove.onclick = () => { arr.splice(i, 1); renderList(key, group, sub); };

      li.appendChild(check);
      li.appendChild(text);
      li.appendChild(remove);
      ul.appendChild(li);
    });
  }

  function toHref(str){
    const trimmed = str.trim();
    if(/^https?:\/\//i.test(trimmed)) return trimmed;
    if(/^[\w-]+(\.[\w-]+)+([\/?#].*)?$/i.test(trimmed)) return 'https://' + trimmed;
    return null;
  }

  function displayUrl(href){
    try{
      const u = new URL(href);
      return u.hostname.replace(/^www\./, '');
    } catch(e){
      return href;
    }
  }

  function addItem(key, group, sub){
    const id = idFor(key, group, sub);
    const input = document.getElementById(id + '-input');
    const val = input.value.trim();
    if(!val) return;
    const linkInput = document.getElementById(id + '-link-input');
    const url = linkInput ? linkInput.value.trim() : '';
    arrFor(key, group, sub).push({ text: val, done: false, url: url });
    input.value = '';
    if(linkInput) linkInput.value = '';
    renderList(key, group, sub);
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  renderTabs();
  renderPages();
</script>
